      summary: Liste des réservations
      description: |-
        Récupération de liste de réservations part critères :

        - d'un client en particulier
        - présentes entre 2 dates
        - en checkin à date
        - en checkout à date
        - présentes à date
        - crées entre 2 dates
        - modifiées depuis une date/heure
        - par son id de groupe
        - annulées (oui/non)
