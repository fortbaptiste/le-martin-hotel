  /hub/api/partner/hotel/pricing/by-nights:
    get:
      tags:
        - Hotel
      summary: Récupération des prix packagés nuitée par nuitée
      description: >-
        Récupération des prix packagé (qui prennent en compte les prix des
        extras automatiques) pour 1 nuité.


        Le param format=best-price permet de récupérer directement le meileur
        prix (le plus bas) par jours pour la période demandée. Dans ce cas, les
        restriction min stay, max stay, CTA et CTD ne sont pas prix en compte.
      parameters:
