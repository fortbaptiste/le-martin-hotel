  /hub/api/partner/resort/payment-links/booking/1310:
    post:
      tags:
        - Resort
      summary: Générer un lien de paiement
      description: >-
        Le lien de paiement peut être récupéré ou/et être envoyé par email.


        Les différentes cibles sont :


        - une réservation Hotel :
        /hub/api/partner/resort/payment-links/booking/1234
            
        - un dossier Service :
        /hub/api/partner/resort/payment-links/service/1234
            
        - un dossier Resort : /hub/api/partner/resort/payment-links/order/1234
            
        - une facture : /hub/api/partner/resort/payment-links/invoice/1234
            

        Si \[customer_id/email/content\] sont renseignés, le lien sera envoyé
        par email.  

        Si \[amount\] est renseigné, ce montant sera forcé.


        ``` json

        {
            "lang": "fr", // string ISO2 (or null for default)
            "amount": null, // float (or null for default)
            // to send link by email (optional)
            "customer_id": null, // 4, // int
            "email": null, // "john.doe@thais-hotel.com",  // string, valid email
            "content": null, // string or null, optional email content
            // to manage the payment page (optional)
            "banner": true, // boolean (or null for default)
            "footer": true, // boolean (or null for default)
            "box": true // boolean (or null for default)
        }

         ```
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                lang: fr
                amount: null
                customer_id: null
                email: null
                content: null
                banner: true
                footer: true
                box: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              examples:
                Générer un lien de paiement:
                  value:
                    url: >-
                      https://demo.thais-hotel.com/hub/payment/booking/1310?lang=fr&key=bc95d238715993579b9a13babd2a120ef7ed653b&banner=1&footer=1&box=1
                    email: null
