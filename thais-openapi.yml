openapi: 3.0.0
info:
  title: Thaïs Partner API
  description: >-
    Le PMS APIfier.


    Cette API permet de lire et d'écrire les informations dans votre PMS.  
      
    La documentation des webhooks est accessible via cette url :
    [https://demo.thais-hotel.com/hub/doc/webhook.html](https://demo.thais-hotel.com/hub/doc/webhook.html)


    Contact Support :


    Name : Vionnet Aurélien


    Email : [a.vionnet@thais-soft.com](https://mailto:a.vionnet@thais-soft.com)
  version: 1.0.0
  x-logo:
    url: /hub/logo-thais.svg
    altText: Thaïs PMS
servers:
  - url: 'https://demo.thais-hotel.com'
    description: Demo environment server
  - url: 'http://dev.thais-vm.local/'
    description: Local dev environment server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
security:
  - bearerAuth: []
tags:
  - name: Général
  - name: Clients
    description: >-
      Cette partie décrit l'ensemble de route permettant de lire/écrire des
      informations sur les clients de l'établissement.
  - name: Hotel
    description: >-
      Cette partie va définir l'ensemble des routes d'API permettant de lire et
      écrire des données concernant les réservations hôtel.
  - name: Hotel - (eResa)
    description: >-
      Thaïs possède un système de pré-réservation nommé **eResa**.  

      Un **eResa** est une réservation brute qui sert de passerelle entre les
      Channel Managers (CM) et notre système de réservation.
  - name: Resort
  - name: Restaurant
  - name: Notifications
    description: |-
      Système de notification.  
      Ce système permet de "viser" un type d'élément.  
      Les type d'éléments possible actuellement sont:

      `TARGET_TYPES = [ 'booking', 'bookingGroup', 'eBooking', 'customer' ]`

      Les modules possible sont:

      `MODULES = ['HOTEL', 'RESTO', 'RESORT', 'POS']`
  - name: Ménage
  - name: Service
  - name: Log
paths:
  /hub/api/partner/login:
    post:
      tags:
        - Général
      summary: Demande de token de connexion
      description: >
        Demande de token d'authentification.

        Le token en retour sera à utiliser dans tous les appels aux routes
        d'API.

        Ce token a une durée de 10 minutes.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                username: thaisAPI
                password: thaisAPI2024
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              examples:
                Token de connexion:
                  value:
                    token: >-
                      eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpYXQiOjE2MTM2OTgwOTgsImV4cCI6MTYxMzY5ODY5OCwidXNlcl9pZCI6MSwidXNlcl91c2VybmFtZSI6InN1cHBvcnQifQ.sZAsmTdtQliNKz8zBOpZWIfNFfeeOGJwKRs1Fwj1M4E
        '401':
          content:
            application/json:
              examples:
                Erreur de connexion:
                  value:
                    reason: invalid credentials
  /hub/api/partner/config:
    get:
      tags:
        - Général
      summary: Configuration de l'instance
      description: >-
        Demande de la configuration de l'instance.


        le param lang peut etre donner pour recevoir la config dans une langue
        differente.
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: lang
          in: query
          schema:
            type: string
          example: fr
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              examples:
                Configuration de l'instance:
                  value:
                    name: Thaïs-dev
                    address: 245 Sous le Mont Noir
                    postcode: '39150'
                    city: Lac des Rouges Truites
