  '/hub/api/partner/hotel/bookings/{booking_id}/booking-rooms/{id}/transfers':
    post:
      tags:
        - Hotel
      summary: Transférer des ventes sur une chambre
      description: >-
        Transfert de ventes sur une chambre.  

        Les champs label et external_reference permettent d'enregistrer la
        provenance des ventes depuis le partenaire (id externe).


        2 types de ventes sont possibles :


        - une vente libre (libelle, prix, quantité, catégorie, taux de TVA)
            
            ```
                      {
                        "type": "RESTAURANT_PURCHASE",
                        "label": "EXTRA LIBRE API PARTNER",
                        "description": "test",
                        "quantity": 4,
                        "price_including_taxes": 10.55,
                        "tax_rate": 5.50,
                        "discount_rate": 0,
                        "offered": false,
                        "consumed_at": null,
                        "category_id": 18,
                        "customer_id": 234
                      }
            
             ```
            
        - une vente d'extra déjà présent dans le catalogue (id, quantité)
            
            ```
                      {
                        "type": "RESTAURANT_PURCHASE",
                        "article_id": 3,
                        "description": null,
                        "quantity": 2,
                        "discount_rate": 50,
                        "offered": false,
                        "consumed_at": null
                      }
            
             ```
            

        Les différents "type" de ventes sont : `HOTEL_PURCHASE,
        HOTEL_PURCHASE_FREE, HOTEL_TAXE, HOTEL_INSURANCE, RESTAURANT_PURCHASE,
        SHOP_PURCHASE, SERVICE_BOOKING, SERVICE_PURCHASE`
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                label: Resto 12345
                external_reference: Ext. 12345
                purchases:
                  - type: RESTAURANT_PURCHASE
                    label: EXTRA LIBRE API PARTNER
                    category_id: 3
                    description: null
                    quantity: 1
                    price_including_taxes: 123.23
                    tax_rate: 20
                    discount_rate: 0
                    offered: false
                    consumed_at: null
                  - type: RESTAURANT_PURCHASE
                    article_id: 321
                    description: null
                    quantity: 2
                    discount_rate: 50
                    offered: false
                    consumed_at: null
      parameters:
        - name: booking_id
          in: path
          schema:
            type: string
          required: true
        - name: id
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              examples:
                Transférer des ventes (libre et article) sur une chambre:
                  value:
                    id: 72306
                    createdAt: '2021-07-08T02:30:03+02:00'
                    label: Resto 12345
                    totalExcludingTaxes: 105.41
                    totalIncludingTaxes: 126.23
                    totalOutstandingDeposits: 0
                    totalOutstandingIncludingTaxes: 126.23
