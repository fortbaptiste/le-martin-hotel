  /hub/api/partner/hotel/apr/prices/bulk:
    post:
      tags:
        - Hotel
      summary: Modification tarifaire (yield)
      description: >-
        Mise à jour des tarifs et restrictions.  

        Les tarifs dérivés seront mis à jours automatiquement.


        Renvoie la liste des tarifs/restrictions impactés.


        Les champs de restrictions (min_stay, max_stay, coa, cod, stop_sell)
        sont facultatifs : s'ils sont omis, les valeurs actuelles de ces champs
        ne seront pas modifiées.Cela permet de ne faire que des modifications de
        prix sans modifier les restrictions.
