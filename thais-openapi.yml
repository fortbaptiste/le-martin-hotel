      tags:
        - Service
      summary: Création d'une réservation
      description: '"customer_id" peut etre utilisé a la place de de l''object "customer"'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                source: dayuse
                external_id: DAYUSE_3456
