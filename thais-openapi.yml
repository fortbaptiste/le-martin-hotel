                      cms_content:
                        hotel_characteristics: ''
                        terms_of_sales: >-
                          <p><strong>Article 1 - dur&eacute;e du s&eacute;jour
                          :&nbsp;</strong></p>

                          <p><span style="line-height: 1.3;">Le client
                          signataire du contrat conclu pour une dur&eacute;e
                          d&eacute;termin&eacute;e ne pourra en aucune
                          circonstance se pr&eacute;valoir d'un quelconque droit
                          au maintien dans les lieux.</span></p>

                          <p><span style="line-height: 1.3;">&nbsp;</span></p>

                          <p><span style="line-height: 1.3;"><strong
                          style="line-height: 1.3;">Article 2 - conclusion du
                          contrat :&nbsp;</strong></span></p>

                          <p><span style="line-height: 1.3;">La
                          r&eacute;servation en ligne devient effective
                          apr&egrave;s paiement des arrhes. Sans paiement sous
                          48 heures, la pr&eacute;-r&eacute;servation sera
                          automatiquement annul&eacute;e.</span></p>

                          <p><span style="line-height: 1.3;">&nbsp;</span></p>

                          <p><span style="line-height: 1.3;"><strong
                          style="line-height: 1.3;">Article 3 - annulation par
                          le client:</strong>&nbsp;</span></p>

                          <p><em><strong><span style="line-height: 1.3;">* Pour
                          les r&eacute;servations affectu&eacute;es jusqu'au 26
                          f&eacute;vrier 2024 :&nbsp;</span></strong></em></p>

                          <p><span style="line-height: 1.3;"><strong
                          style="line-height: 1.3;">a)</strong>&nbsp;En cas
                          d&rsquo;annulation ou de modification
                          jusqu&rsquo;&agrave; 7 jours avant la date
                          d&rsquo;arriv&eacute;e, aucun frais ne sera
                          pr&eacute;lev&eacute;.&nbsp;</span></p>

                          <p><span style="line-height: 1.3;"><strong
                          style="line-height: 1.3;">b)</strong>&nbsp;En cas
                          d&rsquo;annulation ou de modification tardive ou de
                          non-pr&eacute;sentation, le propri&eacute;taire exige
                          100% du montant du s&eacute;jour.&nbsp;</span></p>

                          <p><span style="line-height: 1.3;"><strong
                          style="line-height: 1.3;">c)&nbsp;</strong>Tout
                          s&eacute;jour commenc&eacute; est d&ucirc;.</span></p>

                          <p>&nbsp;</p>

                          <p><em><strong><span style="line-height: 1.3;">* Pour
                          les r&eacute;servations effectu&eacute;es &agrave;
                          partir du 26 f&eacute;vrier 2024
                          :&nbsp;</span></strong></em></p>

                          <p><span style="line-height: 1.3;"><strong
                          style="line-height: 1.3;">a)</strong> En cas
                          d&rsquo;annulation ou de modification
                          jusqu&rsquo;&agrave; 48 Heures avant la date
                          d&rsquo;arriv&eacute;e, aucun frais ne sera
                          pr&eacute;lev&eacute;.&nbsp;</span></p>

                          <p><span style="line-height: 1.3;"><strong
                          style="line-height: 1.3;">b)</strong> En cas
                          d&rsquo;annulation ou de modification tardive ou de
                          non-pr&eacute;sentation, le propri&eacute;taire exige
                          100% du montant du s&eacute;jour.&nbsp;</span></p>

                          <p><span style="line-height: 1.3;"><strong
                          style="line-height: 1.3;">c) </strong>Tout
                          s&eacute;jour commenc&eacute; est d&ucirc;.</span></p>

                          <p><span style="line-height: 1.3;">&nbsp;</span></p>

                          <p><span style="line-height: 1.3;"><strong
                          style="line-height: 1.3;">Article 4 - arriv&eacute;e
                          :</strong>&nbsp;</span></p>

                          <p><span style="line-height: 1.3;">Le client est
                          accueilli le jour pr&eacute;cis&eacute; &agrave;
                          partir de 16 H ou plus t&ocirc;t selon la
                          disponibilit&eacute;. En cas d'arriv&eacute;e tardive,
                          le client doit pr&eacute;venir le
                          propri&eacute;taire.&nbsp;</span></p>

                          <p><span style="line-height: 1.3;">&nbsp;</span></p>

                          <p><span style="line-height: 1.3;"><strong
                          style="line-height: 1.3;">Article 5 &ndash;
                          R&egrave;glements :</strong>&nbsp;</span></p>

                          <p><span style="line-height:
                          1.3;">&nbsp;R&egrave;glement au propri&eacute;taire
                          par : Esp&egrave;ces, CB ou
                          ch&egrave;que.&nbsp;</span></p>

                          <p><span style="line-height: 1.3;">&nbsp;</span></p>

                          <p><span style="line-height: 1.3;"><strong
                          style="line-height: 1.3;">Article 6 - taxe de
                          s&eacute;jour :&nbsp;</strong></span></p>

                          <p><span style="line-height: 1.3;">La taxe de
                          s&eacute;jour est un imp&ocirc;t local que le client
                          doit acquitter aupr&egrave;s du propri&eacute;taire
                          qui la reverse ensuite au Tr&eacute;sor Public. Elle
                          est incluse dans le tarif.&nbsp;</span></p>

                          <p><span style="line-height: 1.3;">&nbsp;</span></p>

                          <p><span style="line-height: 1.3;"><strong
                          style="line-height: 1.3;">Article 7 - utilisation des
                          lieux :&nbsp;</strong></span></p>

                          <p><span style="line-height: 1.3;">Le client devra
                          respecter le caract&egrave;re paisible des lieux, en
                          faire un usage conforme &agrave; leur destination. Il
                          s&rsquo;engage &agrave; rendre les h&eacute;bergements
                          en bon &eacute;tat.</span></p>

                          <p>&nbsp;</p>

                          <p><span style="line-height: 1.3;">&nbsp;</span></p>

                          <p><span style="line-height: 1.3;"><strong
                          style="line-height: 1.3;">&nbsp;Article 8-
                          capacit&eacute; :</strong>&nbsp;</span></p>

                          <p><span style="line-height: 1.3;">Le contrat est
                          &eacute;tabli pour un nombre pr&eacute;cis de
                          personnes. Si le nombre de clients d&eacute;passe ce
                          nombre, le propri&eacute;taire est en mesure de
                          refuser les clients suppl&eacute;mentaires. Ce refus
                          ne peut en aucun cas &ecirc;tre
                          consid&eacute;r&eacute; comme une modification ou une
                          rupture du contrat &agrave; l'initiative du
                          propri&eacute;taire, de sorte qu'en cas de
                          d&eacute;part d'un nombre de clients sup&eacute;rieur
                          &agrave; ceux refus&eacute;s, le prix correspondant au
                          co&ucirc;t de l'h&eacute;bergement reste acquis au
                          propri&eacute;taire.&nbsp;</span></p>

                          <p><span style="line-height: 1.3;">&nbsp;</span></p>

                          <p><span style="line-height: 1.3;"><strong
                          style="line-height: 1.3;">&nbsp;Article 10 - assurance
                          :</strong>&nbsp;</span></p>

                          <p><span style="line-height: 1.3;">Le client est
                          responsable de tous les dommages survenant de son
                          fait.Il doit donc v&eacute;rifier si son contrat
                          d'habitation principale pr&eacute;voit l'extension
                          vill&eacute;giature (location de vacances). Le
                          locataire atteste &ecirc;tre couvert par une assurance
                          de responsabilit&eacute; civile couvrant sa propre
                          responsabilit&eacute; et celle des personnes
                          l'accompagnant.</span></p>

                          <p><span style="line-height: 1.3;">&nbsp;</span></p>

                          <p><strong style="line-height: 1.3;">Article 11 -
                          litiges :</strong><span style="line-height:
                          1.3;">&nbsp;</span></p>

                          <p><span style="line-height: 1.3;">Il est
                          recommand&eacute; de s'adresser &agrave; l'Office de
                          Tourisme qui interviendra pour favoriser le
                          r&egrave;glement &agrave; l'amiable des litiges - si
                          la r&eacute;clamation est formul&eacute;e dans les
                          trois premiers jours apr&egrave;s l'arriv&eacute;e,
                          pour tout litige concernant l'&eacute;tat des lieux ou
                          l'&eacute;tat descriptif,- &agrave; l'issue du
                          s&eacute;jour pour toutes les autres
                          contestations.Pour tous les litiges qui
                          na&icirc;traient de l&rsquo;ex&eacute;cution ou de
                          l&rsquo;interruption du pr&eacute;sent contrat, seuls
                          les Tribunaux du ressort du lieu de l&rsquo;immeuble
                          objet de la location sont
                          comp&eacute;tents.</span></p>

                          <p>&nbsp;</p>
                        deposit_explanation_text: >-
