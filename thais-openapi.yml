    post:
      tags:
        - Clients
      summary: Fusion de clients
      description: >-
        Cette route permet de fusionner des clients dans le CARDEX.


        A l'issue de cette fusion, seul le premier client du tableau restera et
        l'ensemble des autres fiches seront supprimées.


        Les réservations, factures, tickets et notifications seront transférés
        sur ce client.
