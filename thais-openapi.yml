  /hub/api/partner/service/pricing:
    get:
      tags:
        - Service
      summary: Calculs de prix et dispo.
      description: >-
        Cette route permet de calculer le prix et la disponibilité d'une
        réservation de ressource ou d'un type de ressource.
      parameters:
        - name: from
          in: query
          schema:
            type: string
          example: '2021-09-10 11:00'
        - name: to
          in: query
          schema:
            type: string
          example: '2021-09-10 12:00'
        - name: bookable_type_id
          in: query
          schema:
            type: integer
          example: '1'
        - name: bookable_id
          in: query
          schema:
            type: integer
          example: '12'
        - name: hotel_room_id
          in: query
          schema:
            type: integer
          example: '1'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              examples:
                Calculs de prix et dispo.:
                  value:
                    from: '2021-09-10T11:00:00+02:00'
                    to: '2021-09-10T12:00:00+02:00'
                    price: 50
                    nb_slots: 1
                    availability: 6
                    availables:
                      - id: 1
                        label: Salle A
                        bookable_type_id: 1
                        bookable_type: null
                      - id: 2
                        label: Salle B
                        bookable_type_id: 1
                        bookable_type: null
                      - id: 3
                        label: Salle C
                        bookable_type_id: 1
                        bookable_type: null
                      - id: 4
                        label: Salle D
                        bookable_type_id: 1
                        bookable_type: null
                      - id: 5
                        label: Salle E
                        bookable_type_id: 1
                        bookable_type: null
                      - id: 6
                        label: Salle F
