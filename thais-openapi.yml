  /hub/api/partner/hotel/apr/availabilities/history:
    get:
      tags:
        - Hotel
      summary: Historique des disponibilités
      description: |-
        Lecture des disponibilités par type de chambre entre 2 dates.

        Le paramètre room_type_id[] est facultatif.
      parameters:
        - name: from
          in: query
          schema:
            type: string
          example: '2021-03-15'
        - name: to
          in: query
          schema:
            type: string
          example: '2021-03-25'
        - name: created_at_from
          in: query
          schema:
            type: string
          example: '2021-10-01'
        - name: created_at_to
          in: query
          schema:
            type: string
          example: '2021-10-30'
        - name: 'room_type_id[]'
          in: query
          schema:
            type: integer
          example: '1'
        - name: 'room_type_id[]'
