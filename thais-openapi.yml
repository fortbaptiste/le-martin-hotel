  /hub/api/partner/resort/fec:
    get:
      tags:
        - Resort
      summary: Aide à la préparation au FEC
      parameters:
        - name: startAt
          in: query
          schema:
            type: string
          description: 'format: yyyy-mm-dd'
          example: '2025-01-16'
        - name: endAt
          in: query
          schema:
            type: string
          description: 'format: yyyy-mm-dd'
          example: '2025-01-16'
        - name: documentType
          in: query
          schema:
            type: string
          description: all (default ) | invoice | receipt
          example: all
        - name: groupBy
          in: query
          schema:
            type: string
          description: >-
            account_number | internal_ref | date  ( use pipe to apply multi
            groupBy ) 
          example: account_number|internal_ref
        - name: outstanding
          in: query
          schema:
            type: boolean
          example: 'false'
        - name: ''
          in: query
          schema:
            type: string
          description: json (default ) | html | xls | txt
          example: txt
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
