        Cette route permet d'ajouter un client dans le CARDEX.


        - civility_id : integer from /hub/api/partner/resort/civilities

        - lastname * : required, string(max 80)

        - firstname : string(max 50)

        - company : string(max 50)

        - characteristics : string(max 65535)

        - email : string(max 255)

        - phone : string(max 20)

        - cellphone : string(max 20)

        - postcode : string(max 9)

        - city : string(max 50)

        - country_id : string(code ISO2) or integer (si null, fallback sur
        nationality_id, puis la valeur par défaut de  

        l'hotel)

        - address : string(max 80)

        - address2 : string(max 80)

        - warning : boolean

        - unwanted : boolean

        - travel_card : string(max 20)

        - birthdate : date (format YYYY-MM-DD)

        - customer_group_id : integer from
        /hub/api/partner/resort/customer-groups

        - customer_category_id : integer from
        /hub/api/partner/resort/customer-categories

        - nationality_id : string(code ISO2) or integer (si null, fallback sur
        country_id, puis la valeur par défaut de  

        l'hotel)

        - language_id : integer (si null, fallback sur le langage de la
        country_id ou nationality_id, puis la valeur par défaut de  

        l'hotel)

        - customer_origin_id : integer from
        /hub/api/partner/resort/customer-origins

        - customer_company_id : integer from /hub/api/partner/resort/customers

        - satisfaction_rating : integer (min 0, max 5)

        - contact_channel : string(max 10)

        - auto_email : boolean

        - gdpr_accepted_at : date (format YYYY-MM-DD)

        - vat_number : string(max 255)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                civility_id: 1
                lastname: Doe
                firstname: John
                company: null
                characteristics: null
                email: john.doe@thais-pms.com
                phone: null
                cellphone: '+33612345678'
                postcode: '34000'
