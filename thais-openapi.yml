    post:
      tags:
        - Resort
      summary: Ajouter des ventes
      description: >-
        La date de la vente peut etre précisé soit en global, soit par ventes.


        2 types de ventes sont possibles :


        - une vente libre (libelle, prix, quantité, catégorie, taux de TVA)
            
            ```
                                    {
                                      "type": "RESTAURANT_PURCHASE",
                                      "label": "EXTRA LIBRE API PARTNER",
                                      "description": "test",
                                      "quantity": 4,
                                      "price_including_taxes": 10.55,
                                      "tax_rate": 5.50,
                                      "discount_rate": 0,
                                      "offered": false,
                                      "consumed_at": null,
                                      "category_id": 18,
                                      "customer_id": 234
                                    }
            
             ```
            
        - une vente d'extra déjà présent dans le catalogue (id, quantité)
            
            ```
                                    {
                                      "type": "RESTAURANT_PURCHASE",
                                      "article_id": 3,
                                      "description": null,
                                      "quantity": 2,
                                      "discount_rate": 50,
                                      "offered": false,
                                      "consumed_at": null
                                    }
            
             ```
            

        Les différents "type" de ventes sont : `HOTEL_PURCHASE,
        HOTEL_PURCHASE_FREE, HOTEL_TAXE, HOTEL_INSURANCE, RESTAURANT_PURCHASE,
        SHOP_PURCHASE, SERVICE_BOOKING, SERVICE_PURCHASE`


        Si le type n'est pas défini: `HOTEL_PURCHASE_FREE`est utilisé.


        (format déprécié :


        ```
         {
            "date": "2024-08-30",  
            "label": "jus d'orange",
            "description": "brique 1L",
            "category_id": 2,
            "quantity": 8,
            "priceIncludingTaxes": 5.50,
            "taxRate": 5.5
         },

         ```

        )
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                customer_id: 2
                order_id: 203254
                date: '2025-08-31'
                purchases:
                  - type: SERVICE_PURCHASE
                    article_id: 3
                    description: null
                    quantity: 2
                    category_id: 2
                    discount_rate: 50
                    offered: false
                    consumed_at: null
                  - date: '2024-08-30'
                    label: jus d'orange
                    description: brique 1L
                    category_id: 2
                    quantity: 8
                    priceIncludingTaxes: 5.5
                    taxRate: 5.5
                  - date: '2024-08-31'
                    label: EXTRA LIBRE API PARTNER
                    category_id: 2
                    description: null
                    quantity: 1
                    price_including_taxes: 123.23
                    tax_rate: 20
                    discount_rate: 0
                    offered: false
                    consumed_at: null
      responses:
