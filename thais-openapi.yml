  /hub/api/partner/hotel/pricing:
    get:
      tags:
        - Hotel
      summary: 'Calcul d''un séjour (prix, dispo, restriction)'
      description: |-
        Cette route permet de calculer l'ensemble des données d'un séjour.
        - prix du séjour
        - prix des nuitées
        - liste des extras par personne
        - prix des extras
        - vérification des restrictions
      parameters:
        - name: from
          in: query
          schema:
            type: string
          example: '2020-10-19'
        - name: to
          in: query
          schema:
            type: string
          example: '2020-10-21'
        - name: room_type_id
          in: query
          schema:
            type: integer
          example: '1'
        - name: rate_id
          in: query
          schema:
            type: integer
          example: '33'
        - name: adults
          in: query
          schema:
            type: integer
          example: '2'
        - name: children
          in: query
          schema:
            type: integer
          example: '0'
        - name: infants
          in: query
          schema:
            type: integer
          example: '0'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              examples:
                'Calcul d''un séjour (prix, dispo, restriction)':
                  value:
                    status: false
                    messages:
